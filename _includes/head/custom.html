<!-- start custom head snippets -->

<link
  rel="preload"
  href="{{ '/assets/fonts/cormorant-garamond/cormorant-garamond-latin-variable.woff2' | relative_url }}"
  as="font"
  type="font/woff2"
  crossorigin
>
<link
  rel="preload"
  href="{{ '/assets/fonts/manrope/manrope-latin-variable.woff2' | relative_url }}"
  as="font"
  type="font/woff2"
  crossorigin
>

{% if page.url == '/' or page.url == '/index.html' %}
<link
  rel="preload"
  as="image"
  href="{{ '/assets/images/people/simon-hero-portrait-hero-900.webp' | relative_url }}"
  imagesrcset="{{ '/assets/images/people/simon-hero-portrait-hero-900.webp' | relative_url }} 900w, {{ '/assets/images/people/simon-hero-portrait-hero-1400.webp' | relative_url }} 1400w, {{ '/assets/images/people/simon-hero-portrait-hero.webp' | relative_url }} 1694w"
  imagesizes="(max-width: 860px) 88vw, (max-width: 1280px) 48vw, 52vw"
  fetchpriority="high"
>
{% endif %}

<link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
<link rel="icon" href="{{ '/favicon-96x96.png' | relative_url }}" sizes="96x96" type="image/png">
<link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/apple-touch-icon.png' | relative_url }}">
<link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">

<meta name="theme-color" content="#1a0533">
<meta name="msapplication-TileColor" content="#1a0533">

<!-- end custom head snippets -->
